<!-- {{PROJECT_NAME}} — style guide: Button.
     RULE: no inline colors. All look-and-feel comes from ../css/tokens.css + this file's <style>. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Button — style guide</title>
  <link rel="stylesheet" href="../css/tokens.css" />
  <style>
    body { font-family: var(--font-sans); background: var(--color-bg); color: var(--color-fg); padding: var(--space-8); }
    .btn {
      font-size: var(--text-base);
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      background: var(--color-bg);
      color: var(--color-fg);
      cursor: pointer;
    }
    .btn--primary { background: var(--color-primary); color: var(--color-primary-fg); border-color: transparent; }
    .btn--danger  { background: var(--color-danger);  color: #fff; border-color: transparent; }
    .row { display: flex; gap: var(--space-3); margin-top: var(--space-4); }
  </style>
</head>
<body>
  <h1>Button</h1>
  <div class="row">
    <button class="btn">Default</button>
    <button class="btn btn--primary">Primary</button>
    <button class="btn btn--danger">Danger</button>
  </div>
  <!-- TODO: add states (disabled, loading) + sizes once design is finalized -->
</body>
</html>
